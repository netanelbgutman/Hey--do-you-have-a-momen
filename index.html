<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main wrapper for parallax and scroll effects -->
    <main class="parallax-container">

        <!-- SECTION 1: The Hook - Festive -->
        <section id="birthday-section">
            <div class="parallax-layer bg-layer">
                <!-- Background decorative elements can be added here -->
                <div class="confetti-container"></div>
            </div>
            <div class="content-layer">
                <div class="festive-content">
                    <h1 class="festive-title">[INSERT_FESTIVE_GREETING_HERE]</h1>
                    <p class="festive-subtitle">[INSERT_FUN_SUBTITLE_HERE]</p>
                </div>
            </div>
        </section>

        <!-- SECTION 2: The Heart - Serious -->
        <section id="heartfelt-section">
            <div class="parallax-layer bg-layer">
                <!-- Subtle, atmospheric background for the emotional section -->
                <div class="ambient-light"></div>
            </div>
            <div class="content-layer">
                <div class="heartfelt-content">
                    <div class="letter-body">
                        [INSERT_HEARTFELT_BLESSING_HERE]
                    </div>
                    <p class="sign-off">[INSERT_YOUR_NAME_HERE]</p>
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
