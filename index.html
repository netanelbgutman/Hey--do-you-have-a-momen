<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מזל טוב!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Device Wrapper: Mimics iPhone 15 Pro Max aspect ratio on desktop -->
    <div class="device-container">
        
        <main class="experience-wrapper">
            
            <!-- Section 1: The Decoy -->
            <section id="decoy-section" class="section decoy">
                <div class="decoy-content">
                    <h1 id="decoy-title"></h1>
                    <p id="decoy-subtitle"></p>
                    <div id="decoy-greeting" class="greeting-card"></div>
                </div>
                <!-- Confetti container for JS/CSS animations -->
                <div class="confetti-container"></div>
            </section>

            <!-- Section 2: The Heartfelt Letter -->
            <section id="letter-section" class="section letter">
                <!-- Background Layer (Paper Texture) -->
                <div class="parallax-layer bg-layer"></div>

                <!-- Middle Layer (The actual letter) -->
                <div class="parallax-layer middle-layer">
                    <div id="real-letter" class="letter-text"></div>
                </div>

                <!-- Foreground Layer (The Lilies) -->
                <div class="parallax-layer fg-layer" id="lily-container">
                    <!-- Lilies will be injected or placed here -->
                    <!-- Example Lily SVGs will be handled in CSS/JS for positioning -->
                </div>
            </section>

        </main>
    </div>

    <!-- Content first, then logic -->
    <script src="content.js"></script>
    <script src="script.js"></script>
</body>
</html>
